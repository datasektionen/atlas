  sv: Se koden på GitHub
  en: See the code on GitHub
footer.attribution:
  sv: Skrivet med ❤️ av <a href="https://emmaa.se/">Emma Ericsson</a>
  en: Written with ❤️ by <a href="https://emmaa.se/">Emma Ericsson</a>
index.heading:
  sv: Atlas
  en: Atlas
index.heading.inner:
  sv: Välkommen!
  en: Welcome!
index.heading.inner.user:
  sv: Välkommen, %{x}!
  en: Welcome, %{x}!
index.description:
  sv: >
    <strong>Atlas</strong> är datasektionens centrala nyhet- och eventsystem.
    Allt som publiceras här skickas vidare till <a
    href="https://datasektionen.se/">datasektionen.se</a> (vår officiella
    informationskanal), Discord och Mattermost via en <a href="/api">API</a>
    eller RSS samt ett iCal-flöde för alla event. För att prenumerera på
    nyheterna till din egen RSS-läsare eller kalender gå till <a
    href="/subscribe">"Prenumerera"-sidan</a> och skräddarsy ditt flöde.
  en: >
    <strong>Atlas</strong> is the official news-and-event-management system of
    the Computer Science Chapter. Everything published here will spread to <a
    href="https://datasektionen.se/">datasektionen.se</a>, Discord and
    Mattermost through an <a href="/api">API</a> or RSS-feed, as well as an
    iCal-feed for events. To subscribe to the news yourself, go to the <a
    href="/subscribe">"Subscribe" page</a> and customize your feed.
