_version: 2

control.back:
  sv: Tillbaka
  en: Back
errors.caught.not-found.title:
  sv: Sidan hittades inte
  en: Page Not Found
errors.caught.not-found.description:
  sv: >
    Den efterfrågade sidan hittades inte. Antingen finns den inte, eller så
    saknar du behörighet att se den.
  en: >
    The requested page could not be found. Either it does not exist, or you
    lack the permissions to view it.
errors.caught.unknown.title:
  sv: Okänt fel
  en: Unknown Error
errors.caught.unknown.description:
  sv: >
    Ett okänt fel inträffade! Om felet kvarstår, vänligen kontakta en
    administratör.
  en: >
    An unknown error has occured! If the error persists, please contact an
    administrator.
errors.dto.pipeline.title:
  sv: Pipelinefel
  en: Pipeline Error
errors.dto.pipeline.description:
  sv: >
    Ett fel inträffade vid hantering av din förfrågan. Försök igen senare
    eller kontakta en administratör om felet kvarstår.
  en: >
    An error occured while processing your request. Try again later or
    contact an administrator if the error persists.
errors.dto.forbidden.title:
  sv: Inte tillåtet
  en: Not Allowed
errors.dto.forbidden.description:
  sv: >
    Du saknar de nödvändiga behörigheterna för att utföra denna åtgärd.
  en: >
    You lack the necessary permissions to perform this action.
errors.dto.auth.login.flow.expired.title:
  sv: Autentiseringstiden har löpt ut
  en: Authentication Flow Expired
errors.dto.auth.login.flow.expired.description:
  sv: >
    Det har gått för lång tid sedan du startade detta inloggningsförsök och
    det kan inte längre slutföras. Försök igen.
  en: >
    Too much time has passed since you started this login attempt and it can
    no longer be completed. Please try again.
errors.code:
  sv: "kod: %{x}"
  en: "code: %{x}"
errors.heading:
  sv: Hoppsan!
  en: Whoops!
footer.github:
  sv: Se koden på GitHub
  en: See the code on GitHub
footer.madeby:
  sv: Skrivet med ❤️ av <a href="https://emmaa.se/">Emma Ericsson</a>
  en: Written with ❤️ by <a href="https://emmaa.se/">Emma Ericsson</a>
header.lang.switch:
  sv: Byt språk
  en: Switch language
header.new:
  sv: Skapa nyhet
  en: Create post
index.heading:
  sv: Atlas
  en: Atlas
index.heading.inner:
  sv: Välkommen!
  en: Welcome!
index.description:
  sv: >
    <strong>Atlas</strong> är datasektionens centrala nyhet- och eventsystem.
    Allt som publiceras här skickas vidare till <a
    href="https://datasektionen.se/">datasektionen.se</a> (vår officiella
    informationskanal), Discord och Mattermost via en <a href="/api">API</a>
    eller RSS samt ett iCal-flöde för alla event. För att prenumerera på
    nyheterna till din egen RSS-läsare eller kalender gå till <a
    href="/subscribe">"Prenumerera"-sidan</a> och skräddarsy ditt flöde.
  en: >
    <strong>Atlas</strong> is the official news-and-event-management system of
    the Computer Science Chapter. Everything published here will spread to <a
    href="https://datasektionen.se/">datasektionen.se</a>, Discord and
    Mattermost through an <a href="/api">API</a> or RSS-feed, as well as an
    iCal-feed for events. To subscribe to the news yourself, go to the <a
    href="/subscribe">"Subscribe" page</a> and customize your feed.
nav.login:
  sv: Logga in
  en: Log in
nav.logout:
  sv: Logga ut
  en: Log out
nav.page.subscribe:
  sv: Prenumerera
  en: Subscribe
subscribe.heading:
  sv: Prenumerera
  en: Subscribe
subscribe.description:
