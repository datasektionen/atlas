{% extends "base.html" %} {% block content %}
<div class="hstack" style="justify-content: space-between">
    <span class="hstack">
        <h1>Calendar</h1>
        <button>
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.4"
                stroke-linecap="round"
                stroke-linejoin="round"
            >
                <path d="M8 2v4" />
                <path d="M16 2v4" />
                <rect width="18" height="18" x="3" y="4" rx="2" />
                <path d="M3 10h18" />
                <path d="M10 16h4" />
                <path d="M12 14v4" />
            </svg>
        </button>
        <h4 ot-animate="slide-left">{{cal.month | format_month}}</h4>
    </span>
    {% include "month_select.html" %}
</div>
<div style="overflow-x: scroll">{% include "calendar_view.html" %}</div>
{% endblock %}
